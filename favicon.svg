<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ДА monogram">
  <!-- Oxblood letterpress tile (square, no radius) -->
  <rect width="64" height="64" fill="#7A2A22"/>
  <!-- Rooted-authority ring -->
  <circle cx="32" cy="32" r="27.5" fill="none" stroke="#B5781C" stroke-width="1.6" opacity=".85"/>
  <!-- ДА — outlined (font-independent) so it renders without a webfont -->
  <g fill="none" stroke="#E6DCC3" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Д : roof, splayed sides, overhanging base, two feet -->
    <path d="M18 24 H27"/>
    <path d="M18 24 L16 41"/>
    <path d="M27 24 L29 41"/>
    <path d="M13 41 H32"/>
    <path d="M15.5 41 V45"/>
    <path d="M29.5 41 V45"/>
    <!-- А : caret + crossbar -->
    <path d="M36 45 L43 24 L50 45"/>
    <path d="M38.6 37 H47.4"/>
  </g>
</svg>
